spring.main.log-startup-info=false
spring.banner.location=classpath:banner.txt
# Nitrite logs duplicate-key insert failures at ERROR before controller handlers run.
#logging.level.nitrite=OFF
spring.thymeleaf.cache=false
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
spring.main.lazy-initialization=true
spring.devtools.restart.poll-interval=400ms
spring.devtools.restart.quiet-period=200ms
#logging.console.enabled=false
spring.web.error.include-message=always
spring.web.error.include-stacktrace=always