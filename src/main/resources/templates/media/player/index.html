<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/headLinks::headLinks}"></th:block>

    <script th:src="@{/assets/scripts/hls.js}"></script>
    <link rel="stylesheet" th:href="@{/assets/styles/style.css}"/>
    <meta charset="UTF-8">
    <script th:src="@{/assets/scripts/global.js}"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${media.title}"></title>
    <script th:inline="javascript">
        const MEDIA_HASH = /*[[${media.defaultFile}]]*/ '';
        const START_POSITION = /*[[${startPosition}]]*/ 0;
    </script>
    <script defer  th:src="@{/assets/scripts/mediaPlayerHLS.js}">
    </script>
</head>
<body class="m-0 h-dvh overflow-hidden">
<div id="playerContainer" class="fixed inset-0 bg-black overflow-hidden group">

    <video id="video" onerror="handleOnError()" class="absolute inset-0 w-full h-full object-contain z-0"
           autoplay muted
           onplay="handleOnPlay(this)"></video>

    <div id="loadingSpinner" style="display: flex"
         class="z-10 absolute inset-0 pointer-events-none flex-col items-center justify-center">
        <img class="object-cover brightness-50 absolute inset-0 w-full h-full"
             th:src="|/api/artwork?type=background&id=${media.id}|" alt="">
        <div class="relative gap-3 flex flex-col justify-center items-center w-full h-full">
            <img class="xl:w-1/2 w-[95%] md:w-2/3"
                 th:src="|/api/artwork?type=logo&id=${media.id}|" alt="">
            <div class="relative flex flex-col items-center justify-center gap-4 rounded-2xl border border-white/10 bg-background-modal/95 p-8 shadow-2xl backdrop-blur light:bg-background-modal-light">
                <div class="spinner"></div>
                <p class="text-white text-lg font-medium">Loading...</p>
            </div>
        </div>
    </div>

    <div id="controlsOverlay"
         style="display: none"
         class="absolute inset-0 z-20 flex-col justify-between transition-opacity duration-500 opacity-0 pointer-events-none">

        <div class="bg-linear-to-b from-black to-transparent p-4 text-white">
            <p th:text="${media.title}"></p>
        </div>

        <div id="middleArea" class="flex-1 cursor-pointer flex flex-row items-center justify-center">
        </div>

        <div id="bottom-controls" class="bg-linear-to-t from-black to-transparent p-4 flex flex-col gap-3 text-white">
            <div class="w-full gap-2 flex flex-col">
                <div class="w-full flex flex-row items-center justify-between font-mono text-sm">
                    <p id="currentTimeText">00:00</p>
                    <p id="durationText">00:00</p>
                </div>
                <input type="range" id="seekBar" min="0" max="0" step="0.1" value="0"
                       class="player-range w-full cursor-pointer">
            </div>
            <div class="flex items-center justify-between mt-2">
                <div class="flex items-center gap-2">
                    <button id="playBtn"
                            class="font-material-sharp text-3xl hover:bg-white/20 active:bg-white/30 transition-all p-2 px-3 cursor-pointer rounded-full aspect-square border border-white/10 bg-zinc-900/80">
                        pause
                    </button>
                    <div id="volumeControl" class="group/vol relative flex items-center">
                        <button id="volumeBtn"
                                class="font-material-sharp text-3xl hover:bg-white/20 active:bg-white/30 transition-all p-2 px-3 cursor-pointer rounded-full aspect-square border border-white/10 bg-zinc-900/80">
                            volume_up
                        </button>
                        <div id="volumePanel"
                             class="absolute left-full top-1/2 z-20 flex -translate-y-1/2 overflow-hidden max-w-0 pl-2 opacity-0 -translate-x-1 pointer-events-none transition-all duration-300 group-hover/vol:max-w-44 group-hover/vol:opacity-100 group-hover/vol:translate-x-0 group-hover/vol:pointer-events-auto group-focus-within/vol:max-w-44 group-focus-within/vol:opacity-100 group-focus-within/vol:translate-x-0 group-focus-within/vol:pointer-events-auto">
                            <div class="rounded-lg border border-white/10 bg-background-modal/90 px-3 py-2 shadow-xl backdrop-blur">
                                <label for="volumeSlider" class="sr-only">Volume</label>
                                <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5"
                                       class="volume-range w-28 cursor-pointer">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <button id="pictureInPictureBtn"
                            class="font-material-sharp text-3xl hover:bg-white/20 active:bg-white/30 transition-all p-2 px-3 cursor-pointer rounded-full aspect-square border border-white/10 bg-zinc-900/80">
                        pip
                    </button>
                    <button id="fullscreenBtn"
                            class="font-material-sharp text-3xl hover:bg-white/20 active:bg-white/30 transition-all p-2 px-3 cursor-pointer rounded-full aspect-square border border-white/10 bg-zinc-900/80">
                        fullscreen
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div style="display: none" id="error-screen" class="z-50 absolute inset-0">
        <div class="relative flex flex-row justify-center items-center w-full h-full">
            <img class="object-cover brightness-50 absolute inset-0 w-full h-full"
                 th:src="|/api/artwork?type=background&id=${media.id}|" alt="">
            <div class="relative flex w-full max-w-xl flex-col items-center justify-center gap-2 rounded-2xl border border-white/10 bg-background-modal/95 p-6 shadow-2xl backdrop-blur light:bg-background-modal-light md:p-8">
                <p class="text-2xl text-white text-center"
                   th:text="|Oops, There was an error playing this ${media.type.singular}!|"></p>
                <p class="text-xl text-zinc-400">You can try to download it instead.</p>
                <a th:href="|/api/streaming/video/${media.id}|"
                   class="px-5 mt-4 cursor-pointer rounded-lg bg-primary py-3 font-black text-white shadow-sm transition hover:brightness-110 active:brightness-95 light:text-primary-400">Download</a>
            </div>
        </div>
    </div>

</div>
</body>
</html>
