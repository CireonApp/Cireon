<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/headLinks::headLinks}"></th:block>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
    <link rel="stylesheet" th:href="@{/assets/styles/style.css}"/>
    <meta charset="UTF-8">
    <script th:src="@{/assets/scripts/global.js}"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${media.title}"></title>
    <style>
        .player-range,
        .volume-range {
            -webkit-appearance: none;
            appearance: none;
            height: 0.5rem;
            border-radius: 9999px;
            outline: none;
        }

        .player-range {
            --played: 0%;
            --buffered: 0%;
            background: linear-gradient(
                    to right,
                    color-mix(in oklab, var(--color-primary) 95%, transparent) 0 var(--played, 0%),
                    rgba(255, 255, 255, 0.55) var(--played, 0%) var(--buffered, 0%),
                    rgba(255, 255, 255, 0.18) var(--buffered, 0%) 100%
            );
        }

        .volume-range {
            --volume: 0%;
            background: linear-gradient(
                    to right,
                    color-mix(in oklab, var(--color-primary) 95%, transparent) 0 var(--volume, 0%),
                    rgba(255, 255, 255, 0.22) var(--volume, 0%) 100%
            );
        }

        .player-range::-webkit-slider-thumb,
        .volume-range::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 0.9rem;
            height: 0.9rem;
            border-radius: 9999px;
            border: 2px solid rgba(15, 23, 42, 0.9);
            background: rgba(255, 255, 255, 0.96);
            box-shadow: 0 1px 5px rgba(2, 6, 23, 0.45);
            cursor: pointer;
        }

        .player-range::-moz-range-thumb,
        .volume-range::-moz-range-thumb {
            width: 0.9rem;
            height: 0.9rem;
            border-radius: 9999px;
            border: 2px solid rgba(15, 23, 42, 0.9);
            background: rgba(255, 255, 255, 0.96);
            box-shadow: 0 1px 5px rgba(2, 6, 23, 0.45);
            cursor: pointer;
        }

        .player-range::-moz-range-track,
        .volume-range::-moz-range-track {
            height: 0.5rem;
            border-radius: 9999px;
            background: transparent;
        }
    </style>
    <script defer>
        let alreadyUnmuted = false;

        function unmuteFirstTime(videoElement) {
            if (!alreadyUnmuted) {
                videoElement.muted = false;
                alreadyUnmuted = true;
            }
        }

        function handleOnPlay(videoElement) {
            unmuteFirstTime(videoElement);
        }

        function handleOnError() {
            const errorScreenElement = document.getElementById('error-screen');
            errorScreenElement.style.display = 'block';
        }

        // Ensure DOM is ready before accessing elements
        document.addEventListener('DOMContentLoaded', () => {
            const video = document.getElementById("video");
            const seekBar = document.getElementById("seekBar");
            const playBtn = document.getElementById("playBtn");
            const volumeBtn = document.getElementById("volumeBtn");
            const volumeSlider = document.getElementById("volumeSlider");
            const fullscreenBtn = document.getElementById("fullscreenBtn");
            const playerContainer = document.getElementById("playerContainer");
            const controlsOverlay = document.getElementById("controlsOverlay");

            if (!video || !seekBar || !playBtn || !volumeBtn || !volumeSlider || !fullscreenBtn || !playerContainer || !controlsOverlay) {
                console.error('Required player elements not found');
                return;
            }

            // ── Controls visibility (mirrors Next.js showControls logic) ──────
            let isPlaying = false;
            let fadeTimeout = null;

            function showControls() {
                controlsOverlay.classList.remove("opacity-0", "pointer-events-none");
                controlsOverlay.classList.add("opacity-100");
                playerContainer.style.cursor = "default";

                if (!isPlaying) return; // paused → stay visible, no timer

                clearTimeout(fadeTimeout);
                fadeTimeout = setTimeout(() => {
                    controlsOverlay.classList.remove("opacity-100");
                    controlsOverlay.classList.add("opacity-0", "pointer-events-none");
                    playerContainer.style.cursor = "none";
                }, 3000);
            }

            playerContainer.addEventListener("mousemove", showControls);
            playerContainer.addEventListener("click", showControls);

            video.addEventListener("play", () => {
                isPlaying = true;
                showControls();
            });
            video.addEventListener("pause", () => {
                isPlaying = false;
                showControls();
            });

            // ── Play / Pause ──────────────────────────────────────────────────
            function togglePlay() {
                if (video.paused) {
                    video.play();
                    playBtn.textContent = "pause";
                } else {
                    video.pause();
                    playBtn.textContent = "play_arrow";
                }
            }

            playBtn.addEventListener("click", togglePlay);

            // ── Volume ────────────────────────────────────────────────────────
            let lastNonZeroVolume = video.volume > 0 ? video.volume : 0.5;
            volumeSlider.value = String(video.muted ? 0 : video.volume);

            function updateVolumeSliderVisuals() {
                volumeSlider.style.setProperty("--volume", `${Number(volumeSlider.value) * 100}%`);
            }

            function updateVolumeIcon() {
                if (video.muted || video.volume === 0) {
                    volumeBtn.textContent = "volume_off";
                    return;
                }
                volumeBtn.textContent = video.volume < 0.5 ? "volume_down" : "volume_up";
            }

            volumeBtn.addEventListener("click", () => {
                if (video.muted || video.volume === 0) {
                    video.muted = false;
                    video.volume = lastNonZeroVolume > 0 ? lastNonZeroVolume : 0.5;
                } else {
                    lastNonZeroVolume = video.volume;
                    video.muted = true;
                }
                updateVolumeIcon();
            });

            volumeSlider.addEventListener("input", () => {
                const v = Number(volumeSlider.value);
                video.volume = v;
                if (v > 0) {
                    lastNonZeroVolume = v;
                    video.muted = false;
                } else {
                    video.muted = true;
                }
                updateVolumeIcon();
                updateVolumeSliderVisuals();
            });

            video.addEventListener("volumechange", () => {
                volumeSlider.value = String(video.muted ? 0 : video.volume);
                updateVolumeIcon();
                updateVolumeSliderVisuals();
            });

            updateVolumeIcon();
            updateVolumeSliderVisuals();

            // ── Seek bar ──────────────────────────────────────────────────────
            let isDragging = false;

            function getBufferedPercent() {
                if (!video.duration || video.buffered.length === 0) return 0;
                for (let i = 0; i < video.buffered.length; i++) {
                    if (video.currentTime >= video.buffered.start(i) && video.currentTime <= video.buffered.end(i))
                        return Math.min((video.buffered.end(i) / video.duration) * 100, 100);
                }
                return Math.min((video.buffered.end(video.buffered.length - 1) / video.duration) * 100, 100);
            }

            function updateSeekBarVisuals() {
                const duration = Number(video.duration);
                if (!duration || Number.isNaN(duration)) {
                    seekBar.style.setProperty("--played", "0%");
                    seekBar.style.setProperty("--buffered", "0%");
                    return;
                }
                const played = Math.min((Number(seekBar.value) / duration) * 100, 100);
                seekBar.style.setProperty("--played", `${played}%`);
                seekBar.style.setProperty("--buffered", `${Math.max(getBufferedPercent(), played)}%`);
            }

            function formatSeconds(totalSeconds) {
                const hours = Math.floor(totalSeconds / 3600);
                const minutes = Math.floor((totalSeconds % 3600) / 60);
                const seconds = totalSeconds % 60;

                // Pad minutes and seconds with a leading zero
                const paddedM = String(minutes).padStart(2, '0');
                const paddedS = String(seconds).padStart(2, '0');

                // If there are no hours, only return MM:SS
                if (hours === 0) {
                    return `${paddedM}:${paddedS}`;
                }

                // Otherwise, pad the hours and return HH:MM:SS
                const paddedH = String(hours).padStart(2, '0');
                return `${paddedH}:${paddedM}:${paddedS}`;
            }

            const currentTimeElement = document.getElementById("current-time-text");
            const durationTextElement = document.getElementById("duration-text");

            video.addEventListener("loadedmetadata", () => {
                seekBar.max = video.duration;
                document.getElementById("controlsOverlay").style.display = "flex";
                durationTextElement.textContent = formatSeconds(parseInt(video.duration.toFixed(0)));
                updateSeekBarVisuals();
            });
            video.addEventListener("timeupdate", () => {
                currentTimeElement.textContent = formatSeconds(parseInt(video.currentTime.toFixed(0)));
                if (isDragging) return;
                seekBar.value = video.currentTime;
                updateSeekBarVisuals();
            });
            video.addEventListener("progress", updateSeekBarVisuals);
            seekBar.addEventListener("mousedown", () => {
                isDragging = true;
            });
            document.addEventListener("mouseup", () => {
                isDragging = false;
            });
            seekBar.addEventListener("input", () => {
                video.currentTime = seekBar.value;
                updateSeekBarVisuals();
            });
            updateSeekBarVisuals();

            // ── Fullscreen ────────────────────────────────────────────────────
            async function toggleFullscreen() {
                if (!document.fullscreenElement) {
                    playerContainer.requestFullscreen();

                } else {
                    document.exitFullscreen();
                }
            }

            fullscreenBtn.addEventListener("click", toggleFullscreen);

            document.addEventListener("fullscreenchange", () => {
                fullscreenBtn.textContent = document.fullscreenElement ? "fullscreen_exit" : "fullscreen";
            });

            // ── Keyboard shortcuts ────────────────────────────────────────────
            document.addEventListener("keydown", e => {
                if (e.code === "Space") {
                    e.preventDefault();
                    togglePlay();
                    return;
                }
                if (e.code === "KeyF") {
                    e.preventDefault();
                    toggleFullscreen();
                    return;
                }
                if (e.code === "ArrowRight") {
                    e.preventDefault();
                    video.currentTime = Math.min(video.currentTime + 10, video.duration);
                    return;
                }
                if (e.code === "ArrowLeft") {
                    e.preventDefault();
                    video.currentTime = Math.max(video.currentTime - 10, 0);
                }
            });

            const middleArea = document.getElementById("middleArea");
            middleArea.addEventListener("click",togglePlay)
            middleArea.addEventListener("dblclick",toggleFullscreen)

            function togglePictureInPicture() {
                if (document.pictureInPictureElement) {
                    document.exitPictureInPicture();
                    pictureInPictureButton.textContent = "pip"
                } else {
                    video.requestPictureInPicture();
                    pictureInPictureButton.textContent = "pip_exit"
                }
            }

            const pictureInPictureButton = document.getElementById("pictureInPictureBtn");
            pictureInPictureButton.addEventListener("click", togglePictureInPicture)
        });

    </script>
</head>
<body class="m-0 h-dvh overflow-hidden">
<div id="playerContainer" class="fixed inset-0 bg-black overflow-hidden">

    <video id="video" onerror="handleOnError()" class="absolute inset-0 w-full h-full object-contain"
           th:src="|/api/streaming/video/${media.hash}|" autoplay muted
           onplay="handleOnPlay(this)"></video>

    <!-- Single controls overlay — fades in/out like Next.js controlsVisible -->
    <div id="controlsOverlay"
         style="display: none"
         class="absolute inset-0 z-10 flex-col justify-between transition-opacity duration-500 opacity-100">

        <!-- Title bar -->
        <div class="bg-linear-to-b from-black to-transparent p-4 text-white">
            <p th:text="${media.title}"></p>
        </div>

        <!-- Click-to-play middle area (mirrors Next.js onClick={togglePlay} / onDoubleClick={toggleFullscreen}) -->
        <div id="middleArea" class="flex-1"></div>

        <!-- Bottom controls bar -->
        <div class="bg-linear-to-t from-black to-transparent p-4 flex flex-col gap-3 text-white">
            <div class="w-full gap-2 flex flex-col">
                <div class="w-full flex flex-row items-center justify-between">
                    <p id="current-time-text"></p>
                    <p id="duration-text"></p>
                </div>
                <input type="range" id="seekBar" min="0" max="0" value="0" class="player-range w-full cursor-pointer">
            </div>
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <button id="playBtn"
                            class="font-material-sharp text-3xl hover:bg-white/20 active:bg-white/30 transition-all p-2 px-3 cursor-pointer rounded-full aspect-square border border-white/10 bg-zinc-900/80">
                        pause
                    </button>
                    <div id="volumeControl" class="group relative flex items-center">
                        <button id="volumeBtn"
                                class="font-material-sharp text-3xl hover:bg-white/20 active:bg-white/30 transition-all p-2 px-3 cursor-pointer rounded-full aspect-square border border-white/10 bg-zinc-900/80">
                            volume_up
                        </button>
                        <div id="volumePanel"
                             class="absolute left-full top-1/2 z-20 flex -translate-y-1/2 overflow-hidden max-w-0 pl-2 opacity-0 -translate-x-1 pointer-events-none transition-all duration-300 group-hover:max-w-44 group-hover:opacity-100 group-hover:translate-x-0 group-hover:pointer-events-auto group-focus-within:max-w-44 group-focus-within:opacity-100 group-focus-within:translate-x-0 group-focus-within:pointer-events-auto">
                            <div class="rounded-lg border border-white/10 bg-background-modal/90 px-3 py-2 shadow-xl backdrop-blur">
                                <label for="volumeSlider" class="sr-only">Volume</label>
                                <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5"
                                       class="volume-range w-28 cursor-pointer">
                            </div>
                        </div>
                    </div>
                </div>
                <div>
                    <button id="pictureInPictureBtn"
                            class="font-material-sharp text-3xl hover:bg-white/20 active:bg-white/30 transition-all p-2 px-3 cursor-pointer rounded-full aspect-square border border-white/10 bg-zinc-900/80">
                        pip
                    </button>
                    <button id="fullscreenBtn"
                            class="font-material-sharp text-3xl hover:bg-white/20 active:bg-white/30 transition-all p-2 px-3 cursor-pointer rounded-full aspect-square border border-white/10 bg-zinc-900/80">
                        fullscreen
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Error screen overlay -->
    <div style="display: none" id="error-screen" class="z-100 absolute inset-0">
        <div class="relative flex flex-row justify-center items-center w-full h-full">
            <img class="object-cover brightness-50 absolute inset-0 w-full h-full"
                 th:src="|/api/artwork?type=background&id=${media.hash}|" alt="">
            <div class="relative flex w-full max-w-xl flex-col items-center justify-center gap-2 rounded-2xl border border-white/10 bg-background-modal/95 p-6 shadow-2xl backdrop-blur light:bg-background-modal-light md:p-8">
                <p class="text-2xl" th:text="|Oops, There was an error playing this ${media.type.singular}!|"></p>
                <p class="text-xl text-zinc-400">You can try to download it instead.</p>
                <a th:href="|/api/streaming/video/${media.hash}|"
                   class="px-3 cursor-pointer rounded-lg bg-primary py-3 font-black text-white shadow-sm transition hover:brightness-110 active:brightness-95 light:text-primary-400">Download</a>
            </div>
        </div>
    </div>

</div>
</body>
</html>
