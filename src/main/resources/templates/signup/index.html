<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" th:href="@{/assets/styles/global.css}"/>
    <link rel="stylesheet" th:href="@{/assets/styles/login.css}">
    <meta charset="UTF-8">
    <script th:src="@{/assets/scripts/login.js}"></script>
    <script src="http://localhost:35729/livereload.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign Up</title>
</head>
<body>
<div class="container">
    <div class="flex-row-center title gap-1rem">
        <img width="50px" th:src="@{/assets/icons/user_add_primary.svg}" alt="">
        <p>Sign Up</p>
    </div>
    <div id="error-bubble" style="display: none" class="error-message flex-row-center">
        <img width="30px" th:src="@{/assets/icons/error_white.svg}" alt="">
        <p id="error-message">
            Error
        </p>
    </div>
    <form class="flex-col-center" autocomplete="off" action="javascript:signup()" method="post">
        <div class="field">
            <label for="username">Username</label>
            <input maxlength="18" minlength="6" pattern="^[a-zA-Z0-9_]+$" required id="username" type="text"/>
        </div>

        <div class="field">
            <label for="displayName">Display Name</label>
            <input maxlength="20" minlength="2" required id="displayName" type="text"/>
        </div>

        <div class="field">
            <label for="password">Password</label>
            <div class="password-container">
                <input required minlength="8" maxlength="24" pattern="^[a-zA-Z0-9]+$" id="password" type="password"/>
                <img alt="" onclick="showHidePassword()" id="showHidePasswordButton" class="password-hide-show-button" width=30
                     th:src="@{/assets/icons/not_visible_primary.svg}">
            </div>
        </div>

        <button id="submit-button" type="submit">Sign Up</button>
    </form>
    <div>
        <a class="link" href="/login">I already have an account!</a>
    </div>
</div>
</body>
</html>
