<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" th:href="@{/assets/styles/style.css}"/>
    <meta charset="UTF-8">
    <script th:src="@{/assets/scripts/global.js}"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cireon</title>
</head>
<body class="margin-0 min-h-[200vh] bg-gradient">
<header th:replace="~{fragments/header::header(${user})}"></header>
<th:block th:if="${mediaBillboard != null}">
    <div th:replace="~{fragments/components::billboard(${mediaBillboard})}"></div>
</th:block>
<div class="flex flex-col gap-4 w-full overflow-x-auto p-4">
    <th:block th:each="carouselItem : ${carousels}">
        <div th:replace="~{fragments/components::carousel(carousel=${carouselItem})}"></div>
    </th:block>
</div>
</body>
</html>
