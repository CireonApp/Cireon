<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<!--/*@thymesVar id="currentSettings" type="com.cireonapp.server.domain.config.Config"*/-->
<div class=" border rounded-md gap-2 p-4 w-full flex flex-col justify-around border-white/10 bg-background-modal/70 transition-transform duration-300 hover:-translate-y-2"
     th:fragment="config(currentSettings)">
    <!-- Sticky Save Button -->
    <div class="sticky top-32 md:top-32 lg:top-19 z-40 bg-background-modal/95 backdrop-blur-sm border-b border-white/10 -mx-4 -mt-4 px-4 py-3 mb-4">
        <button onclick="saveAllConfig()"
                class="w-full cursor-pointer rounded-lg bg-primary py-3 px-4 font-extrabold text-white shadow-lg transition hover:brightness-110 active:brightness-95 light:text-primary-400 flex items-center justify-center gap-2">
            <span class="font-material-sharp text-2xl font-semibold">save</span>
            <span>Save All Configuration</span>
        </button>
    </div>

    <div id="error-bubble" style="display: none"
         class="mb-2 flex w-full flex-col items-start justify-start gap-2 break-all rounded-lg border border-red-500/30 border-l-4 border-l-red-700 bg-red-500/20 p-4 light:border-l-red-600 light:bg-red-300/80">
        <div class="flex w-full flex-row items-center justify-start gap-2">
            <span class="font-material-sharp font-semibold text-4xl light:text-black text-white">error</span>
            <p class="text-xl font-bold">Error</p>
        </div>
        <p id="error-message">
        </p>
    </div>
    <div id="success-bubble" style="display: none"
         class="mb-2 flex w-full flex-col items-start justify-start gap-2 break-all rounded-lg border border-green-500/30 border-l-4 border-l-green-700 bg-green-500/20 p-4 light:border-l-green-600 light:bg-green-300/80">
        <div class="flex w-full flex-row items-center justify-start gap-2">
            <span class="font-material-sharp font-semibold text-4xl light:text-black text-white">check_circle</span>
            <p class="text-xl font-bold">Success!</p>
        </div>
        <p id="success-message">
        </p>
    </div>
    <div class="flex flex-col gap-2">
        <h1 class="text-xl font-bold flex flex-row justify-center items-center w-fit gap-3">
            <span class="font-semibold text-2xl font-material-sharp">network_manage</span>Network</h1>
        <div class=" px-4 mb-1 flex md:flex-row flex-col md:justify-between gap-1.5 items-center">
            <div class="flex flex-col gap-1.5 w-full md:w-1/2">
                <label class="pl-1 text-md font-medium text-zinc-100 light:text-zinc-800" for="port-input">Port</label>
                <label class="pl-1 text-sm font-medium text-zinc-300 light:text-zinc-800" for="port-input">The port the
                    app
                    will listen to. Required application restart for changes to take effect!</label>
            </div>
            <input placeholder="Port"
                   class="h-12 w-full md:w-1/2 rounded-lg border border-white/10 bg-zinc-900 px-4 py-3 pr-12 text-sm text-white outline-none transition focus:border-primary focus:ring-2 focus:ring-primary/40 light:border-primary-100/70 light:border-2 light:bg-stone-100 light:text-black"
                   required min="0" max="65535" th:value="${currentSettings.port}" type="number" id="port-input"/>
        </div>
    </div>
    <div class="h-px w-full bg-white/10"></div>
    <div class="flex flex-col gap-2">
        <h1 class="text-xl font-bold flex flex-row justify-center items-center w-fit gap-3">
            <span class="font-semibold text-2xl font-material-sharp">groups</span>Users</h1>
        <div class="px-4 mb-1 flex md:flex-row flex-col md:justify-between gap-1.5 items-center">
            <div class="flex flex-col gap-1.5 w-full md:w-1/2">
                <label class="pl-1 text-md font-medium text-zinc-100 light:text-zinc-800" for="users-max-input">Max
                    Users</label>
                <label class="pl-1 text-sm font-medium text-zinc-300 light:text-zinc-800" for="users-max-input">The max
                    amount of users that a non admin can create.</label>
            </div>
            <input placeholder="Max Users"
                   class="h-12 w-full md:w-1/2 rounded-lg border border-white/10 bg-zinc-900 px-4 py-3 pr-12 text-sm text-white outline-none transition focus:border-primary focus:ring-2 focus:ring-primary/40 light:border-primary-100/70 light:border-2 light:bg-stone-100 light:text-black"
                   required min="0" th:value="${currentSettings.maxUsers}" type="number" id="users-max-input"/>
        </div>
        <div class="px-4 mb-1 flex md:flex-row flex-col md:justify-between gap-1.5 items-center">
            <div class="flex flex-col gap-1.5 w-full md:w-1/2">
                <label class="pl-1 text-md font-medium text-zinc-100 light:text-zinc-800"
                       for="allow-user-creation-input">Allow
                    User Creation</label>
                <label class="pl-1 text-sm font-medium text-zinc-300 light:text-zinc-800"
                       for="allow-user-creation-input">Whether
                    to allow anyone to create a user</label>
            </div>
            <label for="allow-user-creation-input"
                   class="h-12 flex w-full md:w-1/2 cursor-pointer items-center justify-between rounded-lg border border-white/10 bg-zinc-900 px-4 py-3 text-sm text-white outline-none transition hover:border-primary/60 focus-within:border-primary focus-within:ring-2 focus-within:ring-primary/40 light:border-primary-100/70 light:border-2 light:bg-stone-100 light:text-black">
                <span id="allow-user-creation-input-text"
                      th:text="${currentSettings.allowUserCreation?'Enabled':'Disabled'}"></span>
                <input onchange="(()=>{
                    document.getElementById('allow-user-creation-input-text').innerText = this.checked ? 'Enabled':'Disabled'
                })()"
                       class="peer sr-only" th:checked="${currentSettings.allowUserCreation}" type="checkbox"
                       id="allow-user-creation-input"/>
                <span class="relative inline-block h-6 w-11 rounded-full bg-zinc-700 transition-colors duration-200 after:absolute after:left-0.5 after:top-0.5 after:h-5 after:w-5 after:rounded-full after:bg-white after:transition-transform after:duration-200 peer-checked:bg-primary peer-checked:after:translate-x-5 light:bg-zinc-300"></span>
            </label>
        </div>
    </div>
    <div class="h-px w-full bg-white/10"></div>
    <div class="flex flex-col gap-2">
        <h1 class="text-xl font-bold flex flex-row justify-center items-center w-fit gap-3">
            <span class="font-semibold text-2xl font-material-sharp">movie</span>Streaming</h1>
        <div class="px-4 mb-1 flex md:flex-row flex-col md:justify-between gap-1.5 items-center">
            <div class="flex flex-col gap-1.5 w-full md:w-1/2">
                <label class="pl-1 text-md font-medium text-zinc-100 light:text-zinc-800" for="hardware-acceleration-input">Hardware
                    Acceleration</label>
                <label class="pl-1 text-sm font-medium text-zinc-300 light:text-zinc-800" for="hardware-acceleration-input">
                    Use hardware instead of software encoding, Highly recommended if you have a supported GPU, will offload
                    work to the gpu.
                </label>
            </div>
            <label for="hardware-acceleration-input"
                   class="h-12 flex w-full md:w-1/2 cursor-pointer items-center justify-between rounded-lg border border-white/10 bg-zinc-900 px-4 py-3 text-sm text-white outline-none transition hover:border-primary/60 focus-within:border-primary focus-within:ring-2 focus-within:ring-primary/40 light:border-primary-100/70 light:border-2 light:bg-stone-100 light:text-black">
                <span id="hardware-acceleration-input-text"
                      th:text="${currentSettings.hardwareAcceleration?'Enabled':'Disabled'}"></span>
                <input onchange="(()=>{
                     hardwareAccelerationContainer.style.display = this.checked ? 'flex':'none';
                    document.getElementById('hardware-acceleration-input-text').innerText = this.checked ? 'Enabled':'Disabled'
                })()"
                       class="peer sr-only" th:checked="${currentSettings.hardwareAcceleration}" type="checkbox"
                       id="hardware-acceleration-input"/>
                <span class="relative inline-block h-6 w-11 rounded-full bg-zinc-700 transition-colors duration-200 after:absolute after:left-0.5 after:top-0.5 after:h-5 after:w-5 after:rounded-full after:bg-white after:transition-transform after:duration-200 peer-checked:bg-primary peer-checked:after:translate-x-5 light:bg-zinc-300"></span>
            </label>
        </div>
        <div id="hardwareAccelerationContainer" class="px-4 mb-1 flex md:flex-row flex-col md:justify-between gap-1.5 items-center">
            <div class="flex flex-col gap-1.5 w-full md:w-1/2">
                <label class="pl-1 text-md font-medium text-zinc-100 light:text-zinc-800" for="encoder-input">
                    Encoder
                </label>
                <label class="pl-1 text-sm font-medium text-zinc-300 light:text-zinc-800" for="encoder-input">
                    Select an encoder. Encoder must be compatible with your system.</br> 'Auto' will automatically select
                    the best encoder for your system.</br>
                    Note: LibX264 is a software encoder, to use it just disable hardware acceleration.
                </label>
            </div>
            <div class="relative w-full md:w-1/2 h-12">
                <select id="encoder-input"
                        class="h-full w-full appearance-none rounded-lg border border-white/10 bg-zinc-900 px-4 py-3 pr-10 text-sm text-white outline-none transition focus:border-primary focus:ring-2 focus:ring-primary/40 light:border-primary-100/70 light:border-2 light:bg-stone-100 light:text-black cursor-pointer">
                    <option th:each="encoder : ${T(com.cireonapp.server.domain.config.HardwareEncoders).values()}"
                            th:value="${encoder.toString()}"
                            th:disabled="${encoder.toString() == 'LIBX264'}"
                            th:selected="${currentSettings.encoder != null ? ( encoder.label == currentSettings.encoder.label ? true:false):(encoder.label == 'auto'?true:false)}"
                            th:text="${encoder.name}">
                    </option>
                </select>
                <p class="fill-current font-material-sharp pointer-events-none absolute inset-y-0 right-0  -translate-x-2 text-2xl flex items-center text-zinc-400">
                    keyboard_arrow_down
                </p>
            </div>
        </div>
        <div class="px-4 mb-1 flex md:flex-row flex-col md:justify-between gap-1.5 items-center">
            <div class="flex flex-col gap-1.5 w-full md:w-1/2">
                <label class="pl-1 text-md font-medium text-zinc-100 light:text-zinc-800" for="encoding-quality-input">
                    Quality
                </label>
                <label class="pl-1 text-sm font-medium text-zinc-300 light:text-zinc-800" for="encoding-quality-input">
                    Select encoding quality. Higher quality uses more CPU or GPU and more bandwidth. Lower quality uses less resources.
                </label>
            </div>
            <div class="relative w-full md:w-1/2 h-12">
                <select id="encoding-quality-input"
                        class="h-full w-full appearance-none rounded-lg border border-white/10 bg-zinc-900 px-4 py-3 pr-10 text-sm text-white outline-none transition focus:border-primary focus:ring-2 focus:ring-primary/40 light:border-primary-100/70 light:border-2 light:bg-stone-100 light:text-black cursor-pointer">
                    <option th:each="quality : ${T(com.cireonapp.server.domain.config.EncodingQuality).values()}"
                            th:value="${quality.toString()}"
                            th:selected="${currentSettings.encodingQuality != null ? ( quality.label == currentSettings.encodingQuality.label ? true:false):(quality.label == 'balanced'?true:false)}"
                            th:text="${quality.name}">
                    </option>
                </select>
                <p class="fill-current font-material-sharp pointer-events-none absolute inset-y-0 right-0  -translate-x-2 text-2xl flex items-center text-zinc-400">
                    keyboard_arrow_down
                </p>
            </div>
        </div>
    </div>
</div>
<div class="border flex flex-col rounded-md gap-2 p-4 w-full justify-around border-white/10 bg-background-modal/70 transition-transform duration-300 hover:-translate-y-2"
     th:fragment="users(userList)">
    <div class="overflow-x-auto horizontal-scrollbar rounded-lg border border-white/10 bg-black/10 shadow-inner shadow-black/20">
        <table class="w-full text-left border-collapse text-sm">
            <thead>
            <tr class="text-zinc-200 text-xs font-semibold uppercase tracking-wide  divide-x divide-white/10">
                <th class="py-3 px-4 text-lg text-center border-b border-white/20">Display Name</th>
                <th class="py-3 px-4 text-lg text-center border-b border-white/20">Username</th>
                <th class="py-3 px-4 text-lg text-center border-b border-white/20">Created</th>
                <th class="py-3 px-4 text-lg text-center border-b border-white/20">Last Active</th>
                <th class="py-3 px-4 text-lg text-center border-b border-white/20">Admin</th>
                <th class="py-3 px-4 text-lg text-center border-b border-white/20">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${userList}"
                class="text-zinc-100 border-b border-white/10 odd:bg-white/3 even:bg-transparent hover:bg-primary/10 transition-colors divide-x divide-white/10">
                <td class="py-3 px-4 font-semibold text-base text-white max-w-xs truncate"
                    th:text="${item.displayName}"></td>
                <td class="py-3 px-4 text-zinc-50 truncate max-w-sm" th:text="${item.username}"></td>
                <td class="py-3 px-4 text-zinc-100"
                    th:text="${T(com.cireonapp.server.util.TimeHelper).getReadableTimeFromISO(item.creationDate)}"></td>
                <td class="py-3 px-4 text-zinc-100"
                    th:text="${T(com.cireonapp.server.util.TimeHelper).getReadableTimeFromISO(item.lastUseDate)}"></td>
                <td class="py-3 px-4 text-zinc-100 font-material-rounded font-light text-center text-2xl"
                    th:text="${item.administrator == true ? 'check_box' : 'check_box_outline_blank'}"></td>

                <td class="py-3 px-4">
                    <div class="flex justify-center gap-3 text-white">
                        <button title="Login as a different user. Will log you out!"
                                class="login-as-admin cursor-pointer rounded-md px-3 py-2 border border-sky-400/50 bg-sky-500/20 text-sky-50 font-semibold transition hover:bg-sky-500/30 hover:border-sky-300/70"
                                th:data-username="${item.username}">
                            Login
                        </button>
                        <button title="Edit user's information"
                                class="cursor-pointer rounded-md px-3 py-2 border border-amber-400/50 bg-amber-500/20 text-amber-50 font-semibold transition hover:bg-amber-500/30 hover:border-amber-300/70">
                            Edit
                        </button>
                        <button title="Delete a user"
                                class="delete-as-admin deleteButtons cursor-pointer rounded-md px-3 py-2 border border-rose-400/60 bg-rose-500/40 text-rose-50 font-semibold transition hover:bg-rose-500/50 hover:border-rose-300/80"
                                th:data-username="${item.username}">
                            Delete
                        </button>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
<div class="border flex flex-col items-center rounded-md gap-2 p-4 w-full justify-around border-white/10 bg-background-modal/70 transition-transform duration-300 hover:-translate-y-2"
     th:fragment="content(sourceList)">
    <button class="cursor-pointer max-sm:w-full rounded-lg bg-primary p-3 font-black text-white shadow-sm transition hover:brightness-110 active:brightness-95 light:text-primary-400"
            id="create-source">Create Source
    </button>
    <div th:if="${#arrays.length(sourceList) > 0}"
         class="overflow-x-auto w-full horizontal-scrollbar rounded-lg border border-white/10 bg-black/10 shadow-inner shadow-black/20">
        <table class="w-full text-left border-collapse text-sm">
            <thead>
            <tr class="text-zinc-200 text-xs font-semibold uppercase tracking-wide  divide-x divide-white/10">
                <th class="py-3 px-4 text-lg text-center border-b border-white/20">Enabled</th>
                <th class="py-3 px-4 text-lg text-center border-b border-white/20">Name</th>
                <th class="py-3 px-4 text-lg text-center border-b border-white/20">Description</th>
                <th class="py-3 px-4 text-lg text-center border-b border-white/20">Type</th>
                <th class="py-3 px-4 text-lg text-center border-b border-white/20">Actions</th>
            </tr>
            </thead>
            <tbody>
            <!--/*@thymesVar id="item" type="com.cireonapp.server.domain.media.source.Source"*/-->
            <tr th:each="item : ${sourceList}"
                class="text-zinc-100 border-b border-white/10 odd:bg-white/3 even:bg-transparent hover:bg-primary/10 transition-colors divide-x divide-white/10">
                <td class="py-3 px-4 text-zinc-100 font-material-rounded font-light text-center text-2xl"
                    th:text="${item.enabled ? 'check_box' : 'check_box_outline_blank'}"></td>
                <td class="py-3 px-4 font-semibold text-base text-white max-w-xs truncate"
                    th:text="${item.name}"></td>
                <td class="py-3 px-4 text-zinc-50 truncate max-w-sm"
                    th:text="${#strings.isEmpty(item.description) ? 'N/A' : item.description}"></td>
                <td class="py-3 px-4 text-zinc-100"
                    th:text="${item.type.getLabel()}"></td>

                <td class="py-3 px-4">
                    <div class="flex justify-center gap-3 text-white">
                        <button title="Edit source information"
                                th:data-source="${item.id}"
                                class="cursor-pointer rounded-md px-3 py-2 border border-amber-400/50 bg-amber-500/20 text-amber-50 font-semibold transition hover:bg-amber-500/30 hover:border-amber-300/70">

                            Edit
                        </button>
                        <button title="Delete a source"
                                class="delete-source deleteButtons cursor-pointer rounded-md px-3 py-2 border border-rose-400/60 bg-rose-500/40 text-rose-50 font-semibold transition hover:bg-rose-500/50 hover:border-rose-300/80"
                                th:data-source-id="${item.id}">
                            Delete
                        </button>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
