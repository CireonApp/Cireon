name: Build & Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Version tag example v1.0.0 or v0.1.0-alpha (leave empty to use pom.xml version)
        required: false
        default: ""

      target:
        description: Build targets comma separated windows,linux,mac or all
        required: true
        default: all

permissions:
  contents: write

env:
  APP_NAME: CireonBackend
  MAIN_CLASS: org.springframework.boot.loader.launch.JarLauncher
  JAVA_VERSION: "21"

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      app_version: ${{ steps.resolve.outputs.app_version }}
      major_version: ${{ steps.resolve.outputs.major_version }}
      targets: ${{ steps.resolve.outputs.targets }}
    steps:
      - uses: actions/checkout@v4

      - id: resolve
        shell: bash
        run: |
          TAG="${{ inputs.tag }}"
          TARGETS="${{ inputs.target }}"

          # If tag is empty, extract version from pom.xml
          if [ -z "$TAG" ]; then
            echo "Extracting version from pom.xml..."
            POMVERSION=$(grep -m1 '<version>' pom.xml | sed 's/.*<version>\(.*\)<\/version>.*/\1/')
            TAG="v$POMVERSION"
            echo "Automatically using version from pom.xml: $TAG"
          fi

          CLEAN="${TAG#v}"
          VERSION=$(echo "$CLEAN" | grep -oE '^[0-9]+(\.[0-9]+){0,2}')

          if [ -z "$VERSION" ]; then
            echo "Invalid version: $TAG"
            exit 1
          fi

          MAJOR=$(echo "$VERSION" | cut -d'.' -f1)

          echo "release_tag=$TAG" >> $GITHUB_OUTPUT
          echo "app_version=$VERSION" >> $GITHUB_OUTPUT
          echo "major_version=$MAJOR" >> $GITHUB_OUTPUT
          echo "targets=$TARGETS" >> $GITHUB_OUTPUT

  build:
    needs: resolve-version

    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    env:
      RELEASE_TAG: ${{ needs.resolve-version.outputs.release_tag }}
      APP_VERSION: ${{ needs.resolve-version.outputs.app_version }}
      MAJOR_VERSION: ${{ needs.resolve-version.outputs.major_version }}
      TARGETS: ${{ needs.resolve-version.outputs.targets }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Make mvnw executable
        if: runner.os != 'Windows'
        run: chmod +x ./mvnw

      - name: Build JAR
        run: ./mvnw clean package -DskipTests

      - name: Locate JAR
        shell: bash
        run: |
          JAR=$(ls -t target/*.jar | grep -v '\.original$' | head -n1)
          echo "JAR_NAME=$(basename $JAR)" >> $GITHUB_ENV

      - name: Install WiX (Windows only)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install wixtoolset -y --no-progress
          $wixPath = "C:\Program Files (x86)\WiX Toolset v3.14\bin"
          if (Test-Path $wixPath) {
            $wixPath | Out-File -FilePath $env:GITHUB_PATH -Append
          }

      - name: Check target filter
        shell: bash
        run: |
          OS="$RUNNER_OS"
          RAW="$TARGETS"

          IFS=',' read -ra LIST <<< "$RAW"

          ALLOW=0

          for t in "${LIST[@]}"; do
            t=$(echo "$t" | xargs)

            if [ "$t" = "all" ]; then
              ALLOW=1
            fi

            if [ "$t" = "windows" ] && [ "$OS" = "Windows" ]; then ALLOW=1; fi
            if [ "$t" = "linux" ] && [ "$OS" = "Linux" ]; then ALLOW=1; fi
            if [ "$t" = "mac" ] && [ "$OS" = "macOS" ]; then ALLOW=1; fi
          done

          if [ "$ALLOW" -ne 1 ]; then
            echo "Skipping $OS"
            echo "SKIP=true" >> $GITHUB_ENV
            exit 0
          fi

      - name: Stop skipped job
        if: env.SKIP == 'true'
        run: exit 0

      - name: Package app
        shell: bash
        run: |
          mkdir -p dist

          if [ "$RUNNER_OS" = "Windows" ]; then
            jpackage \
              --type exe \
              --name "$APP_NAME" \
              --input target \
              --main-jar "$JAR_NAME" \
              --main-class "$MAIN_CLASS" \
              --app-version "$APP_VERSION" \
              --vendor "Cireon" \
              --license-file LICENSE \
              --description "Cireon Backend Application" \
              --win-shortcut \
              --win-dir-chooser \
              --win-menu \
              --win-menu-group "Cireon" \
              --win-console \
              --dest dist

          elif [ "$RUNNER_OS" = "Linux" ]; then
            jpackage \
              --type deb \
              --name "$APP_NAME" \
              --input target \
              --main-jar "$JAR_NAME" \
              --main-class "$MAIN_CLASS" \
              --app-version "$APP_VERSION" \
              --vendor "Cireon" \
              --license-file LICENSE \
              --description "Cireon Backend Application" \
              --linux-package-name cireon-backend \
              --linux-deb-maintainer "Cireon Team" \
              --linux-menu-group "Application" \
              --dest dist

          elif [ "$RUNNER_OS" = "macOS" ]; then
            if [ "$MAJOR_VERSION" -eq 0 ]; then
              echo "Skipping macOS build"
              echo "SKIP=true" >> $GITHUB_ENV
              exit 0
            fi

            jpackage \
              --type dmg \
              --name "$APP_NAME" \
              --input target \
              --main-jar "$JAR_NAME" \
              --main-class "$MAIN_CLASS" \
              --app-version "$APP_VERSION" \
              --vendor "Cireon" \
              --license-file LICENSE \
              --description "Cireon Backend Application" \
              --mac-package-identifier com.cireon.backend \
              --mac-package-name "Cireon Backend" \
              --dest dist
          fi

      - name: Rename outputs
        if: env.SKIP != 'true'
        shell: bash
        run: |
          mkdir -p release

          shopt -s nullglob
          files=(dist/*)

          if [ ${#files[@]} -eq 0 ]; then
            echo "No artifacts"
            exit 0
          fi

          for f in "${files[@]}"; do
            ext="${f##*.}"
            new="$APP_NAME-$RELEASE_TAG-$RUNNER_OS.$ext"
            mv "$f" "release/$new"
          done

      - name: Prepare JAR artifact
        if: env.SKIP != 'true'
        shell: bash
        run: |
          mkdir -p release
          cp target/*.jar release/$APP_NAME-$RELEASE_TAG.jar

      - name: Upload artifacts
        if: env.SKIP != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}
          path: release/*

  release:
    needs: [build, resolve-version]
    runs-on: ubuntu-latest

    env:
      RELEASE_TAG: ${{ needs.resolve-version.outputs.release_tag }}
      APP_VERSION: ${{ needs.resolve-version.outputs.app_version }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Flatten files
        run: |
          mkdir flat
          find release-assets -type f | while read f; do
            cp "$f" flat/
          done

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "${{ env.APP_NAME }} ${{ env.RELEASE_TAG }}"
          generate_release_notes: true
          files: flat/*
