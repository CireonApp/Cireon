name: Build & Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Version tag example v1.0.0 or v0.1.0-alpha (leave empty to use pom.xml version)
        required: false
        default: ""

      target:
        description: Build targets comma separated windows,linux,mac or all
        required: true
        default: all

permissions:
  contents: write

env:
  APP_NAME: CireonBackend
  MAIN_CLASS: org.springframework.boot.loader.launch.JarLauncher
  JAVA_VERSION: "21"

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      app_version: ${{ steps.resolve.outputs.app_version }}
      major_version: ${{ steps.resolve.outputs.major_version }}
      targets: ${{ steps.resolve.outputs.targets }}
      build_windows: ${{ steps.resolve.outputs.build_windows }}
      build_linux: ${{ steps.resolve.outputs.build_linux }}
      build_mac: ${{ steps.resolve.outputs.build_mac }}
    steps:
      - uses: actions/checkout@v4

      - id: resolve
        shell: bash
        run: |
          TAG="${{ inputs.tag }}"
          TARGETS=$(echo "${{ inputs.target }}" | tr '[:upper:]' '[:lower:]')

          BUILD_WINDOWS=false
          BUILD_LINUX=false
          BUILD_MAC=false

          IFS=',' read -ra LIST <<< "$TARGETS"
          for t in "${LIST[@]}"; do
            t=$(echo "$t" | xargs)
            case "$t" in
              all)
                BUILD_WINDOWS=true
                BUILD_LINUX=true
                BUILD_MAC=true
                ;;
              windows)
                BUILD_WINDOWS=true
                ;;
              linux)
                BUILD_LINUX=true
                ;;
              mac)
                BUILD_MAC=true
                ;;
            esac
          done

          if [ "$BUILD_WINDOWS" = false ] && [ "$BUILD_LINUX" = false ] && [ "$BUILD_MAC" = false ]; then
            echo "Invalid target input: $TARGETS"
            echo "Use one or more of: windows,linux,mac,all"
            exit 1
          fi

          # If tag is empty, extract version from pom.xml (skip parent version, get project version)
          if [ -z "$TAG" ]; then
            echo "Extracting version from pom.xml..."
            POMVERSION=$(sed -n '/<\/parent>/,/<\/project>/p' pom.xml | grep -m1 '<version>' | sed 's/.*<version>\(.*\)<\/version>.*/\1/')
            TAG="v$POMVERSION"
            echo "Automatically using version from pom.xml: $TAG"
          fi

          CLEAN="${TAG#v}"
          VERSION=$(echo "$CLEAN" | grep -oE '^[0-9]+(\.[0-9]+){0,2}')

          if [ -z "$VERSION" ]; then
            echo "Invalid version: $TAG"
            exit 1
          fi

          MAJOR=$(echo "$VERSION" | cut -d'.' -f1)

          echo "release_tag=$TAG" >> $GITHUB_OUTPUT
          echo "app_version=$VERSION" >> $GITHUB_OUTPUT
          echo "major_version=$MAJOR" >> $GITHUB_OUTPUT
          echo "targets=$TARGETS" >> $GITHUB_OUTPUT
          echo "build_windows=$BUILD_WINDOWS" >> $GITHUB_OUTPUT
          echo "build_linux=$BUILD_LINUX" >> $GITHUB_OUTPUT
          echo "build_mac=$BUILD_MAC" >> $GITHUB_OUTPUT

  build-jar:
    needs: resolve-version
    if: needs.resolve-version.outputs.build_windows == 'true' || needs.resolve-version.outputs.build_linux == 'true' || needs.resolve-version.outputs.build_mac == 'true'
    runs-on: ubuntu-latest

    env:
      RELEASE_TAG: ${{ needs.resolve-version.outputs.release_tag }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      - name: Set release JAR default profile to prod
        shell: bash
        run: |
          sed -i 's/^spring\.profiles\.default=.*/spring.profiles.default=prod/' src/main/resources/application.properties

      - name: Build JAR
        run: ./mvnw package -DskipTests

      - name: Prepare JAR artifact
        shell: bash
        run: |
          mkdir -p release
          JAR=$(ls -t target/*.jar | grep -v '\.original$' | head -n1)
          cp "$JAR" "release/$APP_NAME-$RELEASE_TAG.jar"

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: release/*.jar

  package-windows:
    needs: [resolve-version, build-jar]
    if: needs.resolve-version.outputs.build_windows == 'true'
    runs-on: windows-latest

    env:
      RELEASE_TAG: ${{ needs.resolve-version.outputs.release_tag }}
      APP_VERSION: ${{ needs.resolve-version.outputs.app_version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target

      - name: Locate JAR
        shell: bash
        run: |
          JAR=$(ls -t target/*.jar | head -n1)
          echo "JAR_NAME=$(basename $JAR)" >> $GITHUB_ENV

      - name: Install WiX
        shell: pwsh
        run: |
          if (-not (Get-Command candle.exe -ErrorAction SilentlyContinue)) {
            choco install wixtoolset -y --no-progress
          }
          $wixPath = "C:\Program Files (x86)\WiX Toolset v3.14\bin"
          if (Test-Path $wixPath) {
            $wixPath | Out-File -FilePath $env:GITHUB_PATH -Append
          }

      - name: Package app
        shell: bash
        run: |
          mkdir -p dist
          jpackage \
            --type exe \
            --name "$APP_NAME" \
            --input target \
            --main-jar "$JAR_NAME" \
            --main-class "$MAIN_CLASS" \
            --app-version "$APP_VERSION" \
            --vendor "Cireon" \
            --license-file LICENSE \
            --description "Cireon Backend Application" \
            --arguments "--spring.profiles.active=prod" \
            --win-shortcut \
            --win-menu \
            --win-menu-group "Cireon" \
            --win-console \
            --win-per-user-install \
            --dest dist

      - name: Rename outputs
        shell: bash
        run: |
          mkdir -p release
          shopt -s nullglob
          files=(dist/*)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No artifacts"
            exit 0
          fi
          for f in "${files[@]}"; do
            ext="${f##*.}"
            new="$APP_NAME-$RELEASE_TAG-$RUNNER_OS.$ext"
            mv "$f" "release/$new"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: release/*

  package-linux:
    needs: [resolve-version, build-jar]
    if: needs.resolve-version.outputs.build_linux == 'true'
    runs-on: ubuntu-latest

    env:
      RELEASE_TAG: ${{ needs.resolve-version.outputs.release_tag }}
      APP_VERSION: ${{ needs.resolve-version.outputs.app_version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target

      - name: Locate JAR
        shell: bash
        run: |
          JAR=$(ls -t target/*.jar | head -n1)
          echo "JAR_NAME=$(basename $JAR)" >> $GITHUB_ENV

      - name: Package app
        shell: bash
        run: |
          mkdir -p dist
          jpackage \
            --type deb \
            --name "$APP_NAME" \
            --input target \
            --main-jar "$JAR_NAME" \
            --main-class "$MAIN_CLASS" \
            --app-version "$APP_VERSION" \
            --vendor "Cireon" \
            --license-file LICENSE \
            --description "Cireon Backend Application" \
            --arguments "--spring.profiles.active=prod" \
            --linux-package-name cireon-backend \
            --linux-deb-maintainer "Cireon Team" \
            --linux-menu-group "Application" \
            --dest dist

      - name: Rename outputs
        shell: bash
        run: |
          mkdir -p release
          shopt -s nullglob
          files=(dist/*)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No artifacts"
            exit 0
          fi
          for f in "${files[@]}"; do
            ext="${f##*.}"
            new="$APP_NAME-$RELEASE_TAG-$RUNNER_OS.$ext"
            mv "$f" "release/$new"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: release/*

  package-mac:
    needs: [resolve-version, build-jar]
    if: needs.resolve-version.outputs.build_mac == 'true' && needs.resolve-version.outputs.major_version != '0'
    runs-on: macos-latest

    env:
      RELEASE_TAG: ${{ needs.resolve-version.outputs.release_tag }}
      APP_VERSION: ${{ needs.resolve-version.outputs.app_version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target

      - name: Locate JAR
        shell: bash
        run: |
          JAR=$(ls -t target/*.jar | head -n1)
          echo "JAR_NAME=$(basename $JAR)" >> $GITHUB_ENV

      - name: Package app
        shell: bash
        run: |
          mkdir -p dist
          jpackage \
            --type dmg \
            --name "$APP_NAME" \
            --input target \
            --main-jar "$JAR_NAME" \
            --main-class "$MAIN_CLASS" \
            --app-version "$APP_VERSION" \
            --vendor "Cireon" \
            --license-file LICENSE \
            --description "Cireon Backend Application" \
            --arguments "--spring.profiles.active=prod" \
            --mac-package-identifier com.cireon.backend \
            --mac-package-name "Cireon Backend" \
            --dest dist

      - name: Rename outputs
        shell: bash
        run: |
          mkdir -p release
          shopt -s nullglob
          files=(dist/*)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No artifacts"
            exit 0
          fi
          for f in "${files[@]}"; do
            ext="${f##*.}"
            new="$APP_NAME-$RELEASE_TAG-$RUNNER_OS.$ext"
            mv "$f" "release/$new"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: release/*

  release:
    needs: [resolve-version, build-jar, package-windows, package-linux, package-mac]
    if: >
      always() &&
      needs.build-jar.result == 'success' &&
      (needs.package-windows.result == 'success' || needs.package-windows.result == 'skipped') &&
      (needs.package-linux.result == 'success' || needs.package-linux.result == 'skipped') &&
      (needs.package-mac.result == 'success' || needs.package-mac.result == 'skipped')
    runs-on: ubuntu-latest

    env:
      RELEASE_TAG: ${{ needs.resolve-version.outputs.release_tag }}
      APP_VERSION: ${{ needs.resolve-version.outputs.app_version }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Flatten files
        run: |
          mkdir flat
          find release-assets -type f | while read f; do
            cp "$f" flat/
          done

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "${{ env.APP_NAME }} ${{ env.RELEASE_TAG }}"
          generate_release_notes: true
          files: flat/*
