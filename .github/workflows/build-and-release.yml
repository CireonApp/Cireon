name: Build & Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Version tag example v1.0.0 or v0.1.0-alpha (leave empty to use pom.xml version)
        required: false
        default: ""

      target:
        description: Build targets comma separated windows,linux,mac or all
        required: true
        default: all

permissions:
  contents: write

env:
  APP_NAME: CireonBackend
  MAIN_CLASS: org.springframework.boot.loader.launch.JarLauncher
  JAVA_VERSION: "21"

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      app_version: ${{ steps.resolve.outputs.app_version }}
      major_version: ${{ steps.resolve.outputs.major_version }}
      targets: ${{ steps.resolve.outputs.targets }}
      build_windows: ${{ steps.resolve.outputs.build_windows }}
      build_linux: ${{ steps.resolve.outputs.build_linux }}
      build_mac: ${{ steps.resolve.outputs.build_mac }}
    steps:
      - uses: actions/checkout@v4

      - id: resolve
        shell: bash
        run: |
          TAG="${{ inputs.tag }}"
          TARGETS=$(echo "${{ inputs.target }}" | tr '[:upper:]' '[:lower:]')

          BUILD_WINDOWS=false
          BUILD_LINUX=false
          BUILD_MAC=false

          IFS=',' read -ra LIST <<< "$TARGETS"
          for t in "${LIST[@]}"; do
            t=$(echo "$t" | xargs)
            case "$t" in
              all)
                BUILD_WINDOWS=true
                BUILD_LINUX=true
                BUILD_MAC=true
                ;;
              windows)
                BUILD_WINDOWS=true
                ;;
              linux)
                BUILD_LINUX=true
                ;;
              mac)
                BUILD_MAC=true
                ;;
            esac
          done

          if [ "$BUILD_WINDOWS" = false ] && [ "$BUILD_LINUX" = false ] && [ "$BUILD_MAC" = false ]; then
            echo "Invalid target input: $TARGETS"
            exit 1
          fi

          if [ -z "$TAG" ]; then
            POMVERSION=$(sed -n '/<\/parent>/,/<\/project>/p' pom.xml | grep -m1 '<version>' | sed 's/.*<version>\(.*\)<\/version>.*/\1/')
            TAG="v$POMVERSION"
          fi

          CLEAN="${TAG#v}"
          VERSION=$(echo "$CLEAN" | grep -oE '^[0-9]+(\.[0-9]+){0,2}')
          MAJOR=$(echo "$VERSION" | cut -d'.' -f1)

          echo "release_tag=$TAG" >> $GITHUB_OUTPUT
          echo "app_version=$VERSION" >> $GITHUB_OUTPUT
          echo "major_version=$MAJOR" >> $GITHUB_OUTPUT
          echo "targets=$TARGETS" >> $GITHUB_OUTPUT
          echo "build_windows=$BUILD_WINDOWS" >> $GITHUB_OUTPUT
          echo "build_linux=$BUILD_LINUX" >> $GITHUB_OUTPUT
          echo "build_mac=$BUILD_MAC" >> $GITHUB_OUTPUT

  build-jar:
    needs: resolve-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
      - name: Build JAR
        run: |
          chmod +x ./mvnw
          sed -i 's/^spring\.profiles\.default=.*/spring.profiles.default=prod/' src/main/resources/application.properties
          ./mvnw package -DskipTests
      - name: Prepare JAR artifact
        run: |
          mkdir -p release
          JAR=$(ls -t target/*.jar | grep -v '\.original$' | head -n1)
          cp "$JAR" "release/$APP_NAME-${{ needs.resolve-version.outputs.release_tag }}.jar"
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: release/*.jar

  package-windows:
    needs: [resolve-version, build-jar]
    if: needs.resolve-version.outputs.build_windows == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target
      - name: Package app
        shell: bash
        run: |
          mkdir -p dist
          JAR_NAME=$(basename $(ls target/*.jar))
          jpackage \
            --type exe \
            --name "$APP_NAME" \
            --input target \
            --main-jar "$JAR_NAME" \
            --main-class "$MAIN_CLASS" \
            --app-version "${{ needs.resolve-version.outputs.app_version }}" \
            --vendor "Cireon" \
            --description "Cireon Backend Application" \
            --license-file LICENSE \
            --win-console \
            --win-shortcut \
            --win-menu \
            --win-dir-chooser \
            --win-upgrade-uuid "8f7f6f86-71ef-406c-9ac0-32efb9519901" \
            --dest dist
      - name: Rename outputs
        shell: bash
        run: |
          mkdir -p release
          mv dist/*.exe "release/$APP_NAME-${{ needs.resolve-version.outputs.release_tag }}-Windows.exe"
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: release/*

  package-linux:
    needs: [resolve-version, build-jar]
    if: needs.resolve-version.outputs.build_linux == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target
      - name: Package app
        shell: bash
        run: |
          mkdir -p dist
          JAR_NAME=$(basename $(ls target/*.jar))
          jpackage \
            --type deb \
            --name "$APP_NAME" \
            --input target \
            --main-jar "$JAR_NAME" \
            --main-class "$MAIN_CLASS" \
            --app-version "${{ needs.resolve-version.outputs.app_version }}" \
            --vendor "Cireon" \
            --license-file LICENSE \
            --linux-package-name cireon-backend \
            --dest dist
      - name: Rename outputs
        shell: bash
        run: |
          mkdir -p release
          mv dist/*.deb "release/$APP_NAME-${{ needs.resolve-version.outputs.release_tag }}-Linux.deb"
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: release/*

  package-mac:
    needs: [resolve-version, build-jar]
    if: needs.resolve-version.outputs.build_mac == 'true' && needs.resolve-version.outputs.major_version != '0'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target
      - name: Package app
        shell: bash
        run: |
          mkdir -p dist
          JAR_NAME=$(basename $(ls target/*.jar))
          jpackage \
            --type dmg \
            --name "$APP_NAME" \
            --input target \
            --main-jar "$JAR_NAME" \
            --main-class "$MAIN_CLASS" \
            --app-version "${{ needs.resolve-version.outputs.app_version }}" \
            --vendor "Cireon" \
            --license-file LICENSE \
            --dest dist
      - name: Rename outputs
        shell: bash
        run: |
          mkdir -p release
          mv dist/*.dmg "release/$APP_NAME-${{ needs.resolve-version.outputs.release_tag }}-macOS.dmg"
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: release/*

  release:
    needs: [resolve-version, build-jar, package-windows, package-linux, package-mac]
    if: always() && needs.build-jar.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
      - name: Flatten files
        run: |
          mkdir flat
          find release-assets -type f -exec cp {} flat/ \;
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-version.outputs.release_tag }}
          name: "${{ env.APP_NAME }} ${{ needs.resolve-version.outputs.release_tag }}"
          generate_release_notes: true
          files: flat/*
