name: Build & Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"

permissions:
  contents: write   # needed to create GitHub Releases and upload assets

env:
  APP_NAME: CireonBackend
  MAIN_CLASS: org.springframework.boot.loader.launch.JarLauncher
  JAVA_VERSION: "21"

jobs:
  resolve-version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      app_version: ${{ steps.resolve.outputs.app_version }}
    steps:
      - name: Resolve version
        id: resolve
        shell: pwsh
        run: |
          $releaseTag = if ("${{ github.event_name }}" -eq "workflow_dispatch") { "${{ inputs.tag }}" } else { "${{ github.ref_name }}" }
          if ([string]::IsNullOrWhiteSpace($releaseTag)) {
            throw "Could not resolve release tag."
          }

          $normalized = $releaseTag.Trim()
          if ($normalized.StartsWith("v", [System.StringComparison]::OrdinalIgnoreCase)) {
            $normalized = $normalized.Substring(1)
          }

          if ($normalized -notmatch '^(\d+(?:\.\d+){0,3})') {
            throw "Tag '$releaseTag' does not contain a valid jpackage app version (expected numeric like v1.2.3)."
          }

          $appVersion = $matches[1]
          "release_tag=$releaseTag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "app_version=$appVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

  build-exe-windows:
    name: Build Windows EXE
    needs: resolve-version
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ needs.resolve-version.outputs.release_tag }}
      APP_VERSION: ${{ needs.resolve-version.outputs.app_version }}

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── 2. Set up JDK (includes jpackage since JDK 16+) ───────────────────
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      # ── 3. Install WiX Toolset (required for --type exe) ──────────────────
      - name: Install WiX Toolset v3
        shell: pwsh
        run: |
          $candle = Get-Command candle.exe -ErrorAction SilentlyContinue
          $light = Get-Command light.exe -ErrorAction SilentlyContinue

          if (-not ($candle -and $light)) {
            choco install wixtoolset -y --no-progress
          }

          # Ensure WiX bin directory is on PATH for subsequent steps.
          $wixBinCandidates = @(
            "C:\Program Files (x86)\WiX Toolset v3.14\bin",
            "C:\Program Files (x86)\WiX Toolset v3.11\bin"
          )
          foreach ($path in $wixBinCandidates) {
            if (Test-Path $path) {
              "$path" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            }
          }

          $candle = Get-Command candle.exe -ErrorAction SilentlyContinue
          $light = Get-Command light.exe -ErrorAction SilentlyContinue
          if (-not ($candle -and $light)) {
            throw "WiX v3 tools (candle.exe and light.exe) were not found after installation."
          }

      # ── 4. Build with Maven ────────────────────────────────────────────────
      - name: Build with Maven
        shell: pwsh
        run: ./mvnw.cmd -q clean package -DskipTests

      - name: Resolve packaged jar
        shell: pwsh
        run: |
          $jar = Get-ChildItem -Path target -Filter "*.jar" |
            Where-Object { $_.Name -notlike "*.original" } |
            Sort-Object -Property LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $jar) {
            throw "No packaged JAR found in target/."
          }

          "MAIN_JAR=$($jar.Name)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # ── 5. Package – exe installer ─────────────────────────────────────────
      - name: jpackage – exe installer
        shell: pwsh
        run: |
          $dest = Join-Path $env:RUNNER_TEMP "dist\installer"
          New-Item -ItemType Directory -Path $dest -Force | Out-Null
          jpackage `
            --type exe `
            --name "${{ env.APP_NAME }}" `
            --input target `
            --main-jar "${{ env.MAIN_JAR }}" `
            --main-class "${{ env.MAIN_CLASS }}" `
            --win-console `
            --win-dir-chooser `
            --win-shortcut `
            --win-menu `
            --app-version "${{ env.APP_VERSION }}" `
            --dest $dest
          # Locate the generated installer (jpackage names it <App>-<ver>.exe)
          $installer = Get-ChildItem -Path $dest -Filter "*.exe" | Select-Object -First 1
          if (-not $installer) { throw "No installer .exe found in $dest" }
          # Rename to a predictable, release-friendly filename
          $finalName = "${{ env.APP_NAME }}-${{ env.RELEASE_TAG }}-windows-setup.exe"
          $finalPath = Join-Path $dest $finalName
          Rename-Item -Path $installer.FullName -NewName $finalName
          "INSTALLER_EXE=$finalPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: ${{ env.INSTALLER_EXE }}
          if-no-files-found: error

  build-jar:
    name: Build JAR
    needs: resolve-version
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ needs.resolve-version.outputs.release_tag }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build with Maven
        shell: bash
        run: ./mvnw -q clean package -DskipTests

      - name: Prepare JAR artifact
        shell: bash
        run: |
          jar_path="$(ls -t target/*.jar | grep -v '\\.original$' | head -n1)"
          if [ -z "$jar_path" ]; then
            echo "No packaged JAR found in target/." >&2
            exit 1
          fi

          jar_asset="$RUNNER_TEMP/${APP_NAME}-${RELEASE_TAG}.jar"
          cp "$jar_path" "$jar_asset"
          echo "JAR_ASSET=$jar_asset" >> "$GITHUB_ENV"

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: ${{ env.JAR_ASSET }}
          if-no-files-found: error

  publish-release:
    name: Publish release
    needs:
      - resolve-version
      - build-exe-windows
      - build-jar
    runs-on: ubuntu-latest

    steps:
      - name: Download EXE artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: release-assets

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: release-assets

      # ── 7. Create GitHub Release and upload assets ─────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ env.APP_NAME }} ${{ needs.resolve-version.outputs.release_tag }}"
          draft: false
          prerelease: ${{ contains(needs.resolve-version.outputs.release_tag, '-') }}   # treat v1.0.0-beta as pre-release
          tag_name: ${{ needs.resolve-version.outputs.release_tag }}
          generate_release_notes: true
          files: |
            release-assets/*.exe
            release-assets/*.jar

