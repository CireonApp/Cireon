name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"
   workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for running'
        required: false
        default: 'Manual trigger'

permissions:
  contents: write   # needed to create GitHub Releases and upload assets

env:
  APP_NAME: CireonBackend
  MAIN_JAR: server-0.0.1-SNAPSHOT.jar
  MAIN_CLASS: org.springframework.boot.loader.launch.JarLauncher
  JAVA_VERSION: "21"

jobs:
  build-and-release:
    name: Build & Release (Windows)
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── 2. Set up JDK (includes jpackage since JDK 16+) ───────────────────
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      # ── 3. Install WiX Toolset (required for --type exe) ──────────────────
      - name: Install WiX Toolset v3
        shell: pwsh
        run: |
          choco install wixtoolset --version 3.14.1 -y --no-progress
          # Reload PATH so candle / light are visible in subsequent steps
          $wixPath = "C:\Program Files (x86)\WiX Toolset v3.14\bin"
          if (Test-Path $wixPath) {
            "$wixPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }

      # ── 4. Build with Maven ────────────────────────────────────────────────
      - name: Build with Maven
        shell: pwsh
        run: ./mvnw.cmd -q clean package -DskipTests

      # ── 5. Package – app-image (folder layout, no installer) ──────────────
      - name: jpackage – app-image
        shell: pwsh
        run: |
          $dest = Join-Path $env:RUNNER_TEMP "dist\app-image"
          New-Item -ItemType Directory -Path $dest -Force | Out-Null
          jpackage `
            --type app-image `
            --name "${{ env.APP_NAME }}" `
            --input target `
            --main-jar "${{ env.MAIN_JAR }}" `
            --main-class "${{ env.MAIN_CLASS }}" `
            --win-console `
            --dest $dest
          # Zip the app-image directory so it can be uploaded as a single asset
          $zipPath = Join-Path $env:RUNNER_TEMP "${{ env.APP_NAME }}-${{ github.ref_name }}-windows-app-image.zip"
          Compress-Archive -Path (Join-Path $dest "${{ env.APP_NAME }}") -DestinationPath $zipPath
          echo "APP_IMAGE_ZIP=$zipPath" >> $env:GITHUB_ENV

      # ── 6. Package – exe installer ─────────────────────────────────────────
      - name: jpackage – exe installer
        shell: pwsh
        run: |
          $dest = Join-Path $env:RUNNER_TEMP "dist\installer"
          New-Item -ItemType Directory -Path $dest -Force | Out-Null
          jpackage `
            --type exe `
            --name "${{ env.APP_NAME }}" `
            --input target `
            --main-jar "${{ env.MAIN_JAR }}" `
            --main-class "${{ env.MAIN_CLASS }}" `
            --win-console `
            --win-dir-chooser `
            --win-shortcut `
            --win-menu `
            --app-version "${{ github.ref_name == '' && '1.0.0' || github.ref_name }}" `
            --dest $dest
          # Locate the generated installer (jpackage names it <App>-<ver>.exe)
          $installer = Get-ChildItem -Path $dest -Filter "*.exe" | Select-Object -First 1
          if (-not $installer) { throw "No installer .exe found in $dest" }
          # Rename to a predictable, release-friendly filename
          $finalName = "${{ env.APP_NAME }}-${{ github.ref_name }}-windows-setup.exe"
          $finalPath = Join-Path $dest $finalName
          Rename-Item -Path $installer.FullName -NewName $finalName
          echo "INSTALLER_EXE=$finalPath" >> $env:GITHUB_ENV

      # ── 7. Create GitHub Release and upload assets ─────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ env.APP_NAME }} ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}   # treat v1.0.0-beta as pre-release
          generate_release_notes: true
          files: |
            ${{ env.APP_IMAGE_ZIP }}
            ${{ env.INSTALLER_EXE }}

