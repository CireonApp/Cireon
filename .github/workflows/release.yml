name: Build & Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"

permissions:
  contents: write   # needed to create GitHub Releases and upload assets

env:
  APP_NAME: CireonBackend
  MAIN_JAR: server-0.0.1-SNAPSHOT.jar
  MAIN_CLASS: org.springframework.boot.loader.launch.JarLauncher
  JAVA_VERSION: "21"

jobs:
  build-and-release:
    name: Build & Release (Windows)
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── 2. Set up JDK (includes jpackage since JDK 16+) ───────────────────
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      # ── 3. Install WiX Toolset (required for --type exe) ──────────────────
      - name: Install WiX Toolset v3
        shell: pwsh
        run: |
          $candle = Get-Command candle.exe -ErrorAction SilentlyContinue
          $light = Get-Command light.exe -ErrorAction SilentlyContinue

          if (-not ($candle -and $light)) {
            choco install wixtoolset -y --no-progress
          }

          # Ensure WiX bin directory is on PATH for subsequent steps.
          $wixBinCandidates = @(
            "C:\Program Files (x86)\WiX Toolset v3.14\bin",
            "C:\Program Files (x86)\WiX Toolset v3.11\bin"
          )
          foreach ($path in $wixBinCandidates) {
            if (Test-Path $path) {
              "$path" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            }
          }

          $candle = Get-Command candle.exe -ErrorAction SilentlyContinue
          $light = Get-Command light.exe -ErrorAction SilentlyContinue
          if (-not ($candle -and $light)) {
            throw "WiX v3 tools (candle.exe and light.exe) were not found after installation."
          }

      # ── 4. Resolve version ────────────────────────────────────────────────
      - name: Resolve version
        shell: pwsh
        run: |
          $releaseTag = if ("${{ github.event_name }}" -eq "workflow_dispatch") { "${{ inputs.tag }}" } else { "${{ github.ref_name }}" }
          if ([string]::IsNullOrWhiteSpace($releaseTag)) {
            throw "Could not resolve release tag."
          }

          $normalized = $releaseTag.Trim()
          if ($normalized.StartsWith("v", [System.StringComparison]::OrdinalIgnoreCase)) {
            $normalized = $normalized.Substring(1)
          }

          if ($normalized -notmatch '^(\d+(?:\.\d+){0,3})') {
            throw "Tag '$releaseTag' does not contain a valid jpackage app version (expected numeric like v1.2.3)."
          }

          $appVersion = $matches[1]
          "RELEASE_TAG=$releaseTag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "APP_VERSION=$appVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # ── 5. Build with Maven ────────────────────────────────────────────────
      - name: Build with Maven
        shell: pwsh
        run: ./mvnw.cmd -q clean package -DskipTests

      - name: Resolve packaged jar
        shell: pwsh
        run: |
          $jar = Get-ChildItem -Path target -Filter "*.jar" |
            Where-Object { $_.Name -notlike "*.original" } |
            Sort-Object -Property LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $jar) {
            throw "No packaged JAR found in target/."
          }

          "MAIN_JAR=$($jar.Name)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # ── 5. Package – app-image (folder layout, no installer) ──────────────
      - name: jpackage – app-image
        shell: pwsh
        run: |
          $dest = Join-Path $env:RUNNER_TEMP "dist\app-image"
          New-Item -ItemType Directory -Path $dest -Force | Out-Null
          jpackage `
            --type app-image `
            --name "${{ env.APP_NAME }}" `
            --input target `
            --main-jar "${{ env.MAIN_JAR }}" `
            --main-class "${{ env.MAIN_CLASS }}" `
            --win-console `
            --dest $dest
          # Zip the app-image directory so it can be uploaded as a single asset
          $zipPath = Join-Path $env:RUNNER_TEMP "${{ env.APP_NAME }}-${{ env.RELEASE_TAG }}-windows-app-image.zip"
          Compress-Archive -Path (Join-Path $dest "${{ env.APP_NAME }}") -DestinationPath $zipPath
          echo "APP_IMAGE_ZIP=$zipPath" >> $env:GITHUB_ENV

      # ── 6. Package – exe installer ─────────────────────────────────────────
      - name: jpackage – exe installer
        shell: pwsh
        run: |
          $dest = Join-Path $env:RUNNER_TEMP "dist\installer"
          New-Item -ItemType Directory -Path $dest -Force | Out-Null
          jpackage `
            --type exe `
            --name "${{ env.APP_NAME }}" `
            --input target `
            --main-jar "${{ env.MAIN_JAR }}" `
            --main-class "${{ env.MAIN_CLASS }}" `
            --win-console `
            --win-dir-chooser `
            --win-shortcut `
            --win-menu `
            --app-version "${{ env.APP_VERSION }}" `
            --dest $dest
          # Locate the generated installer (jpackage names it <App>-<ver>.exe)
          $installer = Get-ChildItem -Path $dest -Filter "*.exe" | Select-Object -First 1
          if (-not $installer) { throw "No installer .exe found in $dest" }
          # Rename to a predictable, release-friendly filename
          $finalName = "${{ env.APP_NAME }}-${{ env.RELEASE_TAG }}-windows-setup.exe"
          $finalPath = Join-Path $dest $finalName
          Rename-Item -Path $installer.FullName -NewName $finalName
          echo "INSTALLER_EXE=$finalPath" >> $env:GITHUB_ENV

      # ── 7. Create GitHub Release and upload assets ─────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ env.APP_NAME }} ${{ env.RELEASE_TAG }}"
          draft: false
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}   # treat v1.0.0-beta as pre-release
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: |
            ${{ env.APP_IMAGE_ZIP }}
            ${{ env.INSTALLER_EXE }}

